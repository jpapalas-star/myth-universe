<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Myth Universe</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#02040a;
font-family:Arial;
}

#renderCanvas{
width:100%;
height:100%;
touch-action:none;
}

#resetBtn{
position:fixed;
left:10px;
bottom:10px;
z-index:10;
padding:8px 12px;
border-radius:8px;
border:1px solid #fff3;
background:#0008;
color:white;
}

</style>
</head>

<body>

<button id="resetBtn">RESET</button>

<canvas id="renderCanvas"></canvas>

<script>


const canvas=document.getElementById("renderCanvas")

const engine=new BABYLON.Engine(canvas,true)

const scene=new BABYLON.Scene(engine)

scene.clearColor=new BABYLON.Color4(0.01,0.02,0.05,1)



// CAMERA

const camera=new BABYLON.ArcRotateCamera(
"cam",
-Math.PI/2,
Math.PI/2.6,
380,
BABYLON.Vector3.Zero(),
scene
)

camera.attachControl(canvas,true)

camera.useNaturalPinchZoom=true
camera.pinchDeltaPercentage=0.01
camera.wheelDeltaPercentage=0.01
camera.panningSensibility=120

if(camera.inputs.attached.pointers){
camera.inputs.attached.pointers.multiTouchPanAndZoom=true
}



// LIGHT

new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(0,1,0),
scene
)



const nodes={}
const lines=[]
const dataMap={}

let focusedId=null



// CURVED LINE

function curvedLine(a,b,color){

const mid=BABYLON.Vector3.Lerp(a,b,0.5)

const dir=b.subtract(a)

const normal=new BABYLON.Vector3(
-dir.z,
0,
dir.x
).normalize()

mid.addInPlace(normal.scale(5))

const curve=BABYLON.Curve3.CreateQuadraticBezier(
a,
mid,
b,
24
)

const tube=BABYLON.MeshBuilder.CreateTube(
"tube",
{
path:curve.getPoints(),
radius:0.12
},
scene
)

const mat=new BABYLON.StandardMaterial("m",scene)

mat.emissiveColor=color
mat.disableLighting=true

tube.material=mat

lines.push(tube)

}



// NODE

function createNode(id,x,y,z){

const s=BABYLON.MeshBuilder.CreateSphere(
"s"+id,
{diameter:6},
scene
)

s.position.set(x,y,z)

nodes[id]=s

s.metadata={id}

}



// CONNECT

function connect(a,b){

if(!nodes[a] || !nodes[b]) return

curvedLine(
nodes[a].position,
nodes[b].position,
new BABYLON.Color3(0.4,0.6,1)
)

}



// RELATIVES

function ids(s){

if(!s) return []

return s.split(";").map(v=>v.trim())

}



function getRelatives(id){

const set=new Set()

set.add(id)

const d=dataMap[id]

if(!d) return set

ids(d.Parents).forEach(x=>set.add(x))
ids(d.Children).forEach(x=>set.add(x))
ids(d.Partners).forEach(x=>set.add(x))

return set

}



// FOCUS

function applyFocus(id){

if(focusedId===id){
resetFocus()
return
}

focusedId=id

const rel=getRelatives(id)

for(let k in nodes){

nodes[k].setEnabled(
rel.has(k)
)

}

lines.forEach(l=>l.setEnabled(false))

camera.setTarget(
nodes[id].position
)

camera.radius=60

}



function resetFocus(){

focusedId=null

for(let k in nodes){
nodes[k].setEnabled(true)
}

lines.forEach(l=>l.setEnabled(true))

camera.setTarget(
BABYLON.Vector3.Zero()
)

camera.radius=380

}



document.getElementById("resetBtn").onclick=resetFocus



// POINTER

scene.onPointerObservable.add(pi=>{

if(pi.type!==BABYLON.PointerEventTypes.POINTERDOWN) return

const pick=scene.pick(
scene.pointerX,
scene.pointerY
)

if(!pick.hit) return

const m=pick.pickedMesh

if(!m.metadata) return

applyFocus(m.metadata.id)

})



// LOAD JSON (NO CACHE)

fetch("./app-data.json?v=" + Date.now())

.then(r=>r.json())

.then(data=>{

data.forEach(d=>{
dataMap[d.id]=d
})

createNode("PRIM_CHAOS_001",0,0,0)

for(let i=0;i<20;i++){

const id="n"+i

createNode(
id,
Math.cos(i)*80,
0,
Math.sin(i)*80
)

connect(
"PRIM_CHAOS_001",
id
)

}

})



// LOOP

engine.runRenderLoop(()=>scene.render())

window.addEventListener(
"resize",
()=>engine.resize()
)

</script>

</body>
</html>
