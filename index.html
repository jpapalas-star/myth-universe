<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mythology Universe</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#05070f;}
#renderCanvas{width:100%;height:100%;}
</style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<script>

const canvas=document.getElementById("renderCanvas")
const engine=new BABYLON.Engine(canvas,true)
const scene=new BABYLON.Scene(engine)

const camera=new BABYLON.ArcRotateCamera(
"cam",
-Math.PI/2,
Math.PI/2.5,
220,
BABYLON.Vector3.Zero(),
scene
)

camera.attachControl(canvas,true)

new BABYLON.HemisphericLight(
"l",
new BABYLON.Vector3(0,1,0),
scene
)

let meshMap={}

function ring(mesh,color,size){

let t=
BABYLON.MeshBuilder.CreateTorus(
"r",
{diameter:size,thickness:0.2},
scene
)

t.rotation.x=Math.PI/2
t.position=mesh.position

let m=new BABYLON.StandardMaterial("rm",scene)
m.emissiveColor=color

t.material=m

}



function make(row,x,y,z){

let type=(row.Type||"").toLowerCase()
let model=(row.ModelType||"").toLowerCase()
let cat=(row.Category||"")


let planet=
BABYLON.MeshBuilder.CreateSphere(
"p"+row.id,
{diameter:6},
scene
)

planet.position=new BABYLON.Vector3(x,y,z)

let pmat=new BABYLON.StandardMaterial("pm",scene)

pmat.emissiveColor=
new BABYLON.Color3(
Math.random(),
Math.random(),
Math.random()
)

planet.material=pmat


let mesh

if(model==="energy"){

mesh=
BABYLON.MeshBuilder.CreatePolyhedron(
row.id,
{type:1,size:2},
scene
)

}

else if(cat.includes("Ήρω")){

mesh=
BABYLON.MeshBuilder.CreateCapsule(
row.id,
{height:4,radius:1},
scene
)

}

else if(cat.includes("Θε")){

mesh=
BABYLON.MeshBuilder.CreateCapsule(
row.id,
{height:5,radius:1.3},
scene
)

}

else{

mesh=
BABYLON.MeshBuilder.CreateSphere(
row.id,
{diameter:3},
scene
)

}

mesh.position=planet.position

let mat=new BABYLON.StandardMaterial("m",scene)
mat.emissiveColor=new BABYLON.Color3(1,1,1)
mesh.material=mat

meshMap[row.id]=planet


if(model==="energy")
ring(planet,new BABYLON.Color3(1,1,0),8)

if(type==="group")
ring(planet,new BABYLON.Color3(1,0,1),10)


return planet

}



fetch("app-data.json")
.then(r=>r.json())
.then(data=>{

let i=0

data.forEach(row=>{

let x=Math.cos(i)*40
let z=Math.sin(i)*40
let y=(row.Level||1)*6

make(row,x,y,z)

i+=0.3

})



// ===== ONLY PARENTS + PARTNER =====

data.forEach(row=>{

let self=meshMap[row.id]

if(!self) return


if(row.Parents && row.Parents!="-"){

row.Parents.split(";").forEach(p=>{

let parent=meshMap[p]

if(!parent) return

let id="p_"+p+"_"+row.id

if(scene.getMeshByName(id)) return

let line=
BABYLON.MeshBuilder.CreateLines(
id,
{
points:[
parent.position,
self.position
]
},
scene
)

line.color=new BABYLON.Color3(0,1,0)

})

}


if(row.Partners && row.Partners!="-"){

row.Partners.split(";").forEach(p=>{

if(p>row.id) return

let partner=meshMap[p]

if(!partner) return

let id="partner_"+p+"_"+row.id

if(scene.getMeshByName(id)) return

let line=
BABYLON.MeshBuilder.CreateLines(
id,
{
points:[
partner.position,
self.position
]
},
scene
)

line.color=new BABYLON.Color3(1,0,0)

})

}


})


})


engine.runRenderLoop(()=>{
scene.render()
})

</script>

</body>
</html>
