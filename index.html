<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Myth Universe</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html, body {margin:0;overflow:hidden;background:black;}
canvas {width:100%;height:100%;display:block;}
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>
const canvas = document.getElementById("renderCanvas")
const engine = new BABYLON.Engine(canvas,true)
const scene = new BABYLON.Scene(engine)
scene.clearColor = new BABYLON.Color3(0,0,0)

const camera = new BABYLON.ArcRotateCamera(
"cam", Math.PI/2, Math.PI/3,150,
new BABYLON.Vector3(0,0,0), scene)
camera.attachControl(canvas,true)

const light = new BABYLON.HemisphericLight(
"light", new BABYLON.Vector3(1,1,0), scene)

const spriteMap = {
god:"god_male.png",
goddess:"god_female.png",
hero:"hero_male.png",
heroine:"hero_female.png",
monster:"monster_male.png",
energy:"energy.png",
group:"group.png",
spirit:"spirit.png",
titan:"titan_male.png"
}

function createNode(data,x,z){

let mesh

if(data.Shape === "group"){

mesh = BABYLON.MeshBuilder.CreateSphere(
data.id,{diameter:8},scene)

const mat = new BABYLON.StandardMaterial("m",scene)
mat.emissiveColor = new BABYLON.Color3(0.6,0.2,1)
mesh.material = mat

}else{

mesh = BABYLON.MeshBuilder.CreatePlane(
data.id,{size:8},scene)

const tex = new BABYLON.Texture(
spriteMap[data.ModelType] || "default.png",scene)

const mat = new BABYLON.StandardMaterial("m",scene)
mat.diffuseTexture = tex
mat.emissiveColor = new BABYLON.Color3(1,1,1)
mesh.material = mat
}

mesh.position.x = x
mesh.position.z = z
}

fetch("app-data.json")
.then(r=>r.json())
.then(data=>{

let i=0

data.forEach(d=>{
createNode(
d,
(i%10)*12,
Math.floor(i/10)*12
)
i++
})

})

engine.runRenderLoop(function(){
scene.render()
})
</script>
</body>
</html>
