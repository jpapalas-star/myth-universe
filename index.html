<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth Universe</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#02040a;
font-family:Arial;
}

#renderCanvas{
width:100%;
height:100%;
touch-action:none;
display:block;
}

#indexBtn{
position:fixed;
left:10px;
top:10px;
z-index:20;
}

#homeBtn{
position:fixed;
right:10px;
top:10px;
z-index:20;
}

button{
background:#0008;
color:white;
border:1px solid #fff3;
border-radius:10px;
padding:8px 12px;
font-size:14px;
}

</style>
</head>

<body>

<button id="indexBtn">Index</button>
<button id="homeBtn">Μυθολογία</button>

<canvas id="renderCanvas"></canvas>

<script>

const canvas = document.getElementById("renderCanvas");

const engine = new BABYLON.Engine(canvas,true);

const scene = new BABYLON.Scene(engine);

scene.clearColor = new BABYLON.Color4(0,0,0,1);



const camera = new BABYLON.ArcRotateCamera(
"cam",
-Math.PI/2,
Math.PI/2.5,
380,
BABYLON.Vector3.Zero(),
scene
);

camera.attachControl(canvas,true);

camera.lowerRadiusLimit = 20;
camera.upperRadiusLimit = 5000;

camera.panningSensibility = 40;

camera.wheelDeltaPercentage = 0.02;

camera.pinchDeltaPercentage = 0.02;

camera.useNaturalPinchZoom = true;



const light = new BABYLON.HemisphericLight(
"h",
new BABYLON.Vector3(0,1,0),
scene
);

light.intensity = 1;



const glow = new BABYLON.GlowLayer(
"glow",
scene
);

glow.intensity = 0.3;



const lineMaterials = [];



function c3(hex){

return BABYLON.Color3.FromHexString(hex);

}



function makeLine(a,b,color){

const path = [a,b];

const tube = BABYLON.MeshBuilder.CreateTube(

"line",

{ path, radius:0.06 },

scene

);

const mat = new BABYLON.StandardMaterial("m",scene);

mat.emissiveColor = color;

mat.alpha = 0.5;

mat.disableLighting = true;

tube.material = mat;

lineMaterials.push({

mat:mat,

base:color

});

}



function makeArrow(pos,dir){

const cone = BABYLON.MeshBuilder.CreateCylinder(

"arrow",

{

height:2,

diameterTop:0,

diameterBottom:1

},

scene

);

cone.position = pos;

cone.rotationQuaternion =

BABYLON.Quaternion.FromLookDirectionLH(

dir,

BABYLON.Vector3.Up()

);

const mat = new BABYLON.StandardMaterial("a",scene);

mat.emissiveColor = c3("#56a6ff");

mat.disableLighting = true;

cone.material = mat;

glow.addIncludedOnlyMesh(cone);

}



for(let i=0;i<30;i++){

const a = new BABYLON.Vector3(

Math.random()*200-100,

Math.random()*200-100,

Math.random()*200-100

);

const b = new BABYLON.Vector3(

Math.random()*200-100,

Math.random()*200-100,

Math.random()*200-100

);

makeLine(a,b,c3("#56a6ff"));

makeArrow(

BABYLON.Vector3.Lerp(a,b,0.5),

b.subtract(a).normalize()

);

}



engine.runRenderLoop(()=>{

const t = performance.now()*0.001;

for(let i=0;i<lineMaterials.length;i++){

const m = lineMaterials[i];

const glowV =

0.45 +

Math.sin(t*0.5+i)*0.02;

m.mat.emissiveColor =

m.base.scale(glowV);

}

scene.render();

});



window.addEventListener(

"resize",

()=>engine.resize()

);



</script>

</body>

</html>
