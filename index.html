<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Greek Mythology Orbit v2</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{
  margin:0; width:100%; height:100%; overflow:hidden;
  background:#02040a; font-family:Arial,sans-serif;
}
#renderCanvas{width:100%; height:100%; display:block;}
#hud{
  position:fixed; left:10px; top:10px; z-index:10;
  color:#fff; background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:10px 12px;
  font-size:13px; line-height:1.45; backdrop-filter:blur(6px);
}
#info{
  position:fixed; right:10px; top:10px; z-index:10;
  width:min(360px,calc(100vw - 20px)); max-height:calc(100vh - 20px);
  overflow:auto; color:#fff; background:rgba(0,0,0,.48);
  border:1px solid rgba(255,255,255,.12);
  border-radius:12px; padding:12px 14px; backdrop-filter:blur(6px);
}
#info h2{margin:0 0 6px 0; font-size:22px}
#info .sub{opacity:.78; font-size:13px; margin-bottom:10px}
#info .sec{color:#8fd3ff; margin:10px 0 4px 0; font-weight:bold; font-size:13px}
#info .txt{font-size:13px; line-height:1.5; white-space:pre-wrap}
@media (max-width:900px){
  #info{top:auto; bottom:10px; left:10px; width:auto; max-height:40vh}
}
</style>
</head>
<body>
<div id="hud">
  <div><b>Greek Mythology Orbit v2</b></div>
  <div>Left drag = pan</div>
  <div>Right drag = rotate</div>
  <div>Wheel = zoom</div>
  <div>Blue arrows = parent → child</div>
  <div>Couples = shared random color</div>
</div>
<div id="info">
  <h2>Orbit v2</h2>
  <div class="sub">Chaos center · family clusters · outer rings</div>
  <div class="txt">Πάτα σε μια σφαίρα για πληροφορίες.</div>
</div>
<canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas,true);
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.01,0.02,0.05,1);

const camera = new BABYLON.ArcRotateCamera(
  "cam",
  -Math.PI/2,
  Math.PI/2.6,
  520,
  new BABYLON.Vector3(0,0,0),
  scene
);
camera.lowerRadiusLimit = 60;
camera.upperRadiusLimit = 3000;
camera.wheelDeltaPercentage = 0.01;
camera.panningSensibility = 0; // custom pan
camera.attachControl(canvas, true);

// rotate only with right mouse button
if (camera.inputs && camera.inputs.attached && camera.inputs.attached.pointers) {
  camera.inputs.attached.pointers.buttons = [2];
}

const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 0.95;

const point = new BABYLON.PointLight("point", new BABYLON.Vector3(0,120,0), scene);
point.intensity = 0.35;

// Softer glow; mostly visible on rings, not sprites
const glowLayer = new BABYLON.GlowLayer("glow", scene);
glowLayer.intensity = 0.28;

const nodes = {};
const dataMap = {};
const familyColorByKey = new Map();
const lineDone = new Set();
const membership = new Set(); // ids placed inside family clusters

function hashColor(str){
  let h = 0;
  for(let i=0;i<str.length;i++) h = (h*31 + str.charCodeAt(i)) >>> 0;
  const hue = h % 360;
  return BABYLON.Color3.FromHexString(hslToHex(hue, 80, 65));
}
function hslToHex(h, s, l){
  s/=100; l/=100;
  const k=n=>(n + h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));
  const toHex=x=>Math.round(255*x).toString(16).padStart(2,'0');
  return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;
}
function c3(hex){ return BABYLON.Color3.FromHexString(hex); }

function typeColor(d){
  const cat = String(d.Category||"");
  const model = String(d.ModelType||"");
  const id = String(d.id||"");
  if(id === "PRIM_CHAOS_001") return c3("#ffffff");
  if(model === "group" || d.Shape === "group") return c3("#63a7ff");
  if(model === "energy") return c3("#c084ff");
  if(model === "giant") return c3("#ffbf5e");
  if(model === "spirit") return c3("#ff6b6b");
  if(model === "human") return c3("#d6a86f");
  if(model === "goddess") return c3("#ffd3f0");
  if(model === "god") return c3("#ffe680");
  if(cat.includes("Πρωτογεν")) return c3("#c084ff");
  if(cat.includes("Τιτά")) return c3("#ffbf5e");
  if(cat.includes("Ολύμπ")) return c3("#ffe680");
  if(cat.includes("Ήρω")) return c3("#d6a86f");
  if(cat.includes("Δαίμο")) return c3("#ff6b6b");
  return c3("#b8c5ff");
}
function spriteFile(d){
  const sprite = String(d.sprite||"");
  const model = String(d.ModelType||"");
  const gender = String(d.Gender||"");
  if(sprite === "orb-group") return "group.png";
  if(sprite === "energy-neutral" || sprite === "energy-female") return "energy.png";
  if(sprite === "titan-male") return "titan_male.png";
  if(sprite === "titan-female") return "titan_female.png";
  if(sprite === "god") return gender === "female" ? "god_female.png" : "god_male.png";
  if(sprite === "goddess") return "god_female.png";
  if(sprite === "hero") return "hero_male.png";
  if(sprite === "heroine") return "hero_female.png";
  if(sprite === "monster") return gender === "female" ? "monster_female.png" : "monster_male.png";
  if(sprite === "spirit") return "spirit.png";
  if(sprite === "cosmic") return "cosmic.png";

  if(model === "group") return "group.png";
  if(model === "energy") return "energy.png";
  if(model === "giant") return gender === "female" ? "titan_female.png" : "titan_male.png";
  if(model === "spirit") return "spirit.png";
  if(model === "human") return gender === "female" ? "hero_female.png" : "hero_male.png";
  if(model === "goddess") return "god_female.png";
  if(model === "god") return gender === "female" ? "god_female.png" : "god_male.png";
  return "default.png";
}
function sizeFor(d){
  const model = String(d.ModelType||"");
  const id = String(d.id||"");
  if(id === "PRIM_CHAOS_001") return 20;
  if(model === "group") return 11;
  if(model === "energy") return 14;
  if(model === "giant") return 12;
  if(model === "god" || model === "goddess") return 10;
  if(model === "human") return 9;
  if(model === "spirit") return 8;
  return 9;
}
function idsFromField(s){
  if(!s || s === "-") return [];
  return String(s).split(";").map(v=>v.trim()).filter(Boolean).filter(v=>v !== "-");
}
function createLabel(text, pos){
  const dt = new BABYLON.DynamicTexture("lbl_"+Math.random(), {width:1024, height:256}, scene, true);
  dt.hasAlpha = true;
  dt.drawText(text, null, 160, "bold 90px Arial", "white", "transparent", true);
  const plane = BABYLON.MeshBuilder.CreatePlane("lblp_"+Math.random(), {width:18,height:4.5}, scene);
  const mat = new BABYLON.StandardMaterial("lblm_"+Math.random(), scene);
  mat.diffuseTexture = dt;
  mat.opacityTexture = dt;
  mat.emissiveColor = BABYLON.Color3.White();
  mat.backFaceCulling = false;
  plane.material = mat;
  plane.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;
  plane.position = pos.clone();
}
function addRing(mesh, color, diameter){
  const ring = BABYLON.MeshBuilder.CreateTorus("ring_"+mesh.name+"_"+Math.random(), {
    diameter: diameter,
    thickness: 0.18,
    tessellation: 72
  }, scene);
  ring.rotation.x = Math.PI/2;
  ring.position = mesh.position.clone();
  const rm = new BABYLON.StandardMaterial("rm_"+Math.random(), scene);
  rm.emissiveColor = color;
  rm.alpha = 0.92;
  ring.material = rm;
  glowLayer.addIncludedOnlyMesh(ring);
  return ring;
}
function createNode(d, x, y, z, familyColor=null){
  const size = sizeFor(d);
  const baseColor = familyColor || typeColor(d);

  const sphere = BABYLON.MeshBuilder.CreateSphere("sphere_"+d.id, {diameter:size, segments:32}, scene);
  sphere.position = new BABYLON.Vector3(x,y,z);

  const mat = new BABYLON.StandardMaterial("mat_"+d.id, scene);
  mat.diffuseColor = baseColor.scale(0.18);
  mat.emissiveColor = baseColor.scale(0.18); // lower glow on sphere
  mat.specularColor = BABYLON.Color3.Black();
  mat.alpha = 0.95;
  sphere.material = mat;

  const inner = BABYLON.MeshBuilder.CreatePlane("inner_"+d.id, {size:size*0.82}, scene);
  inner.position = sphere.position.clone();
  const pm = new BABYLON.StandardMaterial("pm_"+d.id, scene);
  const ptex = new BABYLON.Texture("./" + spriteFile(d), scene, false, false);
  ptex.hasAlpha = true;
  pm.diffuseTexture = ptex;
  pm.opacityTexture = ptex;
  pm.emissiveColor = BABYLON.Color3.White().scale(0.86);
  pm.disableLighting = true;
  pm.backFaceCulling = false;
  inner.material = pm;
  inner.billboardMode = BABYLON.Mesh.BILLBOARDMODE_ALL;

  createLabel(d.Name || d.id, sphere.position.add(new BABYLON.Vector3(0, size*0.92, 0)));

  if(String(d.id) === "PRIM_CHAOS_001"){
    addRing(sphere, c3("#ffffff"), size*1.42);
  }
  if(d.ring === true || d.Shape === "group" || d.ModelType === "group"){
    addRing(sphere, baseColor, size*1.30);
  }
  if(d.ModelType === "energy"){
    addRing(sphere, c3("#e0b3ff"), size*1.22);
  }
  if(familyColor){
    addRing(sphere, familyColor, size*1.18);
  }

  sphere.metadata = d;
  inner.metadata = d;
  nodes[d.id] = sphere;
  dataMap[d.id] = d;
}
function arrowMarkers(a, b, color){
  const dir = b.subtract(a);
  const len = dir.length();
  if(len < 10) return;
  const forward = dir.normalize();
  const count = Math.max(1, Math.floor(len / 20));
  for(let i=1;i<=count;i++){
    const t = i / (count + 1);
    const pos = BABYLON.Vector3.Lerp(a, b, t);
    const cone = BABYLON.MeshBuilder.CreateCylinder("arr_"+Math.random(), {
      height: 2.8,
      diameterTop: 0,
      diameterBottom: 1.35,
      tessellation: 8
    }, scene);
    cone.position = pos;
    cone.rotationQuaternion = BABYLON.Quaternion.FromLookDirectionLH(forward, BABYLON.Vector3.Up());
    cone.rotate(BABYLON.Axis.X, Math.PI/2, BABYLON.Space.LOCAL);
    const m = new BABYLON.StandardMaterial("arrm_"+Math.random(), scene);
    m.emissiveColor = color;
    cone.material = m;
  }
}
function connectParent(parentId, childId){
  const a = nodes[parentId], b = nodes[childId];
  if(!a || !b) return;
  const key = "p_" + parentId + "_" + childId;
  if(lineDone.has(key)) return;
  lineDone.add(key);
  const color = c3("#56a6ff");
  const line = BABYLON.MeshBuilder.CreateLines(key, {points:[a.position.clone(), b.position.clone()]}, scene);
  line.color = color;
  line.alpha = 0.95;
  arrowMarkers(a.position.clone(), b.position.clone(), color);
}
function connectPartner(aId, bId, color){
  const a = nodes[aId], b = nodes[bId];
  if(!a || !b) return;
  const key = "m_" + [aId,bId].sort().join("_");
  if(lineDone.has(key)) return;
  lineDone.add(key);
  const line = BABYLON.MeshBuilder.CreateLines(key, {points:[a.position.clone(), b.position.clone()]}, scene);
  line.color = color;
  line.alpha = 0.98;
}
function showInfo(d){
  const info = document.getElementById("info");
  info.innerHTML = `
    <h2>${d.Name || d.id}</h2>
    <div class="sub">${d.Category || ""} · ${d.ModelType || ""} · Gen ${d.Generation ?? "-"}</div>
    <div class="sec">Summary</div><div class="txt">${d.Summary || "-"}</div>
    <div class="sec">Parents</div><div class="txt">${d.Parents || "-"}</div>
    <div class="sec">Partners</div><div class="txt">${d.Partners || "-"}</div>
    <div class="sec">Children</div><div class="txt">${d.Children || "-"}</div>
    <div class="sec">FullText</div><div class="txt">${d.FullText || "-"}</div>
  `;
}
scene.onPointerObservable.add((pi)=>{
  if(pi.pickInfo && pi.pickInfo.hit && pi.pickInfo.pickedMesh && pi.pickInfo.pickedMesh.metadata){
    showInfo(pi.pickInfo.pickedMesh.metadata);
  }
}, BABYLON.PointerEventTypes.POINTERPICK);

// Custom left-drag pan
let isLeftPanning = false;
let lastX = 0, lastY = 0;
canvas.addEventListener("pointerdown", (e)=>{
  if(e.button === 0){
    isLeftPanning = true;
    lastX = e.clientX; lastY = e.clientY;
  }
});
window.addEventListener("pointerup", ()=>{ isLeftPanning = false; });
window.addEventListener("pointermove", (e)=>{
  if(!isLeftPanning) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;

  const panScale = camera.radius * 0.0016;
  const right = camera.getDirection(BABYLON.Axis.X);
  const up = new BABYLON.Vector3(0,1,0);
  camera.target = camera.target.subtract(right.scale(dx * panScale)).add(up.scale(dy * panScale));
});

// Build families
function coupleKey(a, b){ return [a,b].sort().join("|"); }

function buildFamilyClusters(all){
  const families = [];

  // 2-parent families based on partner links + children
  all.forEach(d=>{
    const partners = idsFromField(d.Partners);
    const children = new Set(idsFromField(d.Children));
    partners.forEach(pid=>{
      const p = dataMap[pid];
      if(!p) return;
      const pChildren = new Set(idsFromField(p.Children));
      const shared = [...children].filter(c=>pChildren.has(c));
      if(shared.length){
        const key = coupleKey(d.id, pid);
        if(!families.find(f=>f.key === key)){
          families.push({ key, parents:[d.id, pid], children:shared });
          shared.forEach(c=>membership.add(c));
          membership.add(d.id); membership.add(pid);
        }
      }
    });
  });

  // 1-parent families for nodes with children not already in a 2-parent family
  all.forEach(d=>{
    const kids = idsFromField(d.Children).filter(c=>!membership.has(c));
    if(kids.length){
      const key = "single|" + d.id;
      families.push({ key, parents:[d.id], children:kids });
      kids.forEach(c=>membership.add(c));
      membership.add(d.id);
    }
  });

  return families;
}

function placeFamily(center, family, color){
  const parents = family.parents.map(id=>dataMap[id]).filter(Boolean);
  const children = family.children.map(id=>dataMap[id]).filter(Boolean);

  if(parents.length === 1){
    createNode(parents[0], center.x, center.y, center.z, color);
  }else if(parents.length >= 2){
    const gap = 10;
    createNode(parents[0], center.x - gap/2, center.y, center.z, color);
    createNode(parents[1], center.x + gap/2, center.y, center.z, color);
    connectPartner(parents[0].id, parents[1].id, color);
  }

  const n = children.length || 1;
  const radius = Math.max(18, 12 + n * 1.6);
  for(let i=0;i<n;i++){
    const angle = (Math.PI*2*i/n) - Math.PI/2;
    const x = center.x + Math.cos(angle)*radius;
    const z = center.z + Math.sin(angle)*radius;
    const y = center.y + Math.sin(angle*2)*2;
    createNode(children[i], x, y, z, null);

    family.parents.forEach(pid=>connectParent(pid, children[i].id));
  }
}

function bucketForOuter(d){
  const id = String(d.id||"");
  const model = String(d.ModelType||"");
  const gen = Number(d.Generation||9);
  if(id === "PRIM_CHAOS_001") return "center";
  if(membership.has(id)) return "family";
  if(gen === 1 || model === "energy") return "ring1";
  if(model === "group") return "ring2";
  if(model === "giant") return "ring3";
  if(gen === 3) return "ring4";
  return "ring5";
}
function polar(list, radius, yBase, jitter){
  const out = [];
  const n = list.length || 1;
  for(let i=0;i<n;i++){
    const ang = (Math.PI*2*i/n) - Math.PI/2;
    out.push({
      x:Math.cos(ang)*radius,
      y:yBase + Math.sin(ang*2)*(jitter||0),
      z:Math.sin(ang)*radius
    });
  }
  return out;
}

fetch("./app-data.json?v=orbitv2")
.then(r=>r.json())
.then(all=>{
  all.forEach(d=>{ dataMap[d.id] = d; });

  // center chaos
  const chaos = all.find(d=>d.id === "PRIM_CHAOS_001");
  if(chaos) createNode(chaos, 0, 0, 0);

  const families = buildFamilyClusters(all);

  // Place family clusters around chaos, closer to center than before
  const famPos = polar(families, 92, 0, 10);
  families.forEach((f, i)=>{
    const color = hashColor(f.key);
    familyColorByKey.set(f.key, color);
    placeFamily(famPos[i], f, color);
  });

  // Outer rings for leftovers
  const ring1 = all.filter(d=>bucketForOuter(d)==="ring1");
  const ring2 = all.filter(d=>bucketForOuter(d)==="ring2");
  const ring3 = all.filter(d=>bucketForOuter(d)==="ring3");
  const ring4 = all.filter(d=>bucketForOuter(d)==="ring4");
  const ring5 = all.filter(d=>bucketForOuter(d)==="ring5");

  polar(ring1, 150, 8, 6).forEach((p,i)=>createNode(ring1[i], p.x,p.y,p.z));
  polar(ring2, 192, -8, 8).forEach((p,i)=>createNode(ring2[i], p.x,p.y,p.z));
  polar(ring3, 238, 12, 10).forEach((p,i)=>createNode(ring3[i], p.x,p.y,p.z));
  polar(ring4, 292, -12, 10).forEach((p,i)=>createNode(ring4[i], p.x,p.y,p.z));
  polar(ring5, 350, 0, 12).forEach((p,i)=>createNode(ring5[i], p.x,p.y,p.z));

  // Connect remaining partner lines and parent lines not already drawn
  all.forEach(d=>{
    idsFromField(d.Partners).forEach(pid=>{
      const fam = families.find(f=>f.parents.includes(d.id) && f.parents.includes(pid));
      const color = fam ? familyColorByKey.get(fam.key) : hashColor(coupleKey(d.id, pid));
      connectPartner(d.id, pid, color);
    });
    idsFromField(d.Parents).forEach(pid=>connectParent(pid, d.id));
  });
})
.catch(err=>{
  document.getElementById("info").innerHTML = "<h2>JSON Load Error</h2><div class='txt'>"+String(err)+"</div>";
  console.error(err);
});

engine.runRenderLoop(()=>scene.render());
window.addEventListener("resize",()=>engine.resize());
</script>
</body>
</html>
