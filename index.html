<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth Universe Final Clean</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040a;font-family:Arial,sans-serif}
#renderCanvas{width:100%;height:100%;display:block;touch-action:none}
#panel{position:fixed;left:10px;top:10px;z-index:10;color:#fff;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;font-size:13px}
#info{position:fixed;right:10px;top:10px;z-index:10;color:#fff;width:360px;max-height:90vh;overflow:auto;background:rgba(0,0,0,.46);border-radius:12px;padding:12px}
</style>

</head>
<body>

<div id="panel">Myth Universe</div>
<div id="info">Loading...</div>

<canvas id="renderCanvas"></canvas>

<script>

const canvas=document.getElementById("renderCanvas");
const engine=new BABYLON.Engine(canvas,true);
const scene=new BABYLON.Scene(engine);

scene.clearColor=new BABYLON.Color4(0.01,0.02,0.05,1);

const camera=new BABYLON.ArcRotateCamera(
"cam",
-Math.PI/2,
Math.PI/2.65,
380,
BABYLON.Vector3.Zero(),
scene
);

camera.attachControl(canvas,true);

new BABYLON.HemisphericLight(
"hemi",
new BABYLON.Vector3(0,1,0),
scene
);

const nodes={}
const dataMap={}
const linesDone=new Set()
const placed=new Set()

function idsFromField(s){
if(!s) return []
return String(s).split(";").map(v=>v.trim()).filter(Boolean)
}

function createNode(d,x,y,z){

const s=BABYLON.MeshBuilder.CreateSphere(
"s"+d.id,
{diameter:6},
scene
)

s.position.set(x,y,z)

nodes[d.id]=s
placed.add(d.id)

s.metadata=d

}

function connectPartner(aId,bId){

if(!nodes[aId] || !nodes[bId]) return

BABYLON.MeshBuilder.CreateLines(
"l",
{
points:[
nodes[aId].position,
nodes[bId].position
]
},
scene
)

}

function connectParent(parentId,childId){

if(!nodes[parentId] || !nodes[childId]) return

BABYLON.MeshBuilder.CreateLines(
"p",
{
points:[
nodes[parentId].position,
nodes[childId].position
]
},
scene
)

}

fetch(
"app-data.json?nocache="+Date.now(),
{cache:"no-store"}
)

.then(r=>{
if(!r.ok) throw new Error(r.status)
return r.json()
})

.then(all=>{

all.forEach(d=>dataMap[d.id]=d)

const chaos=all.find(
d=>d.id==="PRIM_CHAOS_001"
)

if(chaos){
createNode(chaos,0,0,0)
}

all.forEach((d,i)=>{

if(d.id==="PRIM_CHAOS_001") return

createNode(
d,
Math.cos(i)*80,
0,
Math.sin(i)*80
)

})

all.forEach(d=>{

idsFromField(d.Partners).forEach(pid=>{

if(nodes[d.id] && nodes[pid]){
connectPartner(d.id,pid)
}

})

idsFromField(d.Parents).forEach(pid=>{

if(nodes[pid] && nodes[d.id]){
connectParent(pid,d.id)
}

})

})

})

.catch(err=>{

document.getElementById("info").innerHTML=
"JSON ERROR<br>"+err

console.error(err)

})

engine.runRenderLoop(()=>{
scene.render()
})

window.addEventListener(
"resize",
()=>engine.resize()
)

</script>

</body>
</html>
