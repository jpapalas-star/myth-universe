<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Orbit Universe V4</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html,body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
width:100%;
height:100%;
display:block;
}
</style>

</head>
<body>

<canvas id="renderCanvas"></canvas>

<script>

const canvas = document.getElementById("renderCanvas")

const engine = new BABYLON.Engine(canvas,true)

const scene = new BABYLON.Scene(engine)

scene.clearColor = new BABYLON.Color3(0,0,0)

const camera = new BABYLON.ArcRotateCamera(
"cam",
Math.PI/2,
Math.PI/3,
120,
new BABYLON.Vector3(0,0,0),
scene
)

camera.attachControl(canvas,true)

camera.panningSensibility = 50

const light = new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(1,1,0),
scene
)


// =========================
// LOAD JSON
// =========================

fetch("app-data.json")
.then(r=>r.json())
.then(data=>{

buildSystem(data)

})


// =========================
// BUILD
// =========================

function buildSystem(data){

const chaos = data.find(x=>x.id.includes("CHAOS"))

let families = {}

data.forEach(c=>{

if(!c.Parents || c.Parents=="-") return

let p = c.Parents.split(";")[0]

if(!families[p]) families[p]=[]

families[p].push(c)

})


let index=0

for(let key in families){

let parent = data.find(x=>x.id==key)

if(!parent) continue

let angle = index * 0.6

let dist = 25

let cx = Math.cos(angle)*dist
let cz = Math.sin(angle)*dist

let parentMesh = makePlanet(parent,cx,0,cz,3)

let kids = families[key]

kids.forEach((k,i)=>{

let a = i*(Math.PI*2/kids.length)

let r = 6

let x = cx + Math.cos(a)*r
let z = cz + Math.sin(a)*r

let childMesh = makePlanet(k,x,0,z,2)

makeLine(parentMesh.position,childMesh.position)

})

index++

}

}


// =========================
// PLANET
// =========================

function makePlanet(obj,x,y,z,size){

let mesh = BABYLON.MeshBuilder.CreateSphere(
"p",
{diameter:size},
scene
)

mesh.position = new BABYLON.Vector3(x,y,z)

let mat = new BABYLON.StandardMaterial("m",scene)

mat.emissiveColor = new BABYLON.Color3(
Math.random(),
Math.random(),
Math.random()
)

mesh.material = mat

return mesh

}


// =========================
// LINE
// =========================

function makeLine(a,b){

BABYLON.MeshBuilder.CreateLines(
"l",
{points:[a,b]},
scene
)

}


// =========================

engine.runRenderLoop(()=>{
scene.render()
})

</script>

</body>
</html>
