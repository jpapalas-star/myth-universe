<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Myth Universe Final Clean FIX</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040a;font-family:Arial,sans-serif}
#renderCanvas{width:100%;height:100%;display:block;touch-action:none}
#panel{position:fixed;left:10px;top:10px;z-index:10;color:#fff;background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;font-size:13px}
#info{position:fixed;right:10px;top:10px;z-index:10;color:#fff;width:360px;max-height:90vh;overflow:auto;background:rgba(0,0,0,.46);border-radius:12px;padding:12px}
#resetBtn{position:fixed;bottom:10px;left:10px;z-index:20}
</style>
</head>

<body>

<button id="resetBtn">RESET</button>

<div id="panel">
Myth Universe
</div>

<div id="info">
Loading...
</div>

<canvas id="renderCanvas"></canvas>

<script>

const canvas=document.getElementById("renderCanvas");
const engine=new BABYLON.Engine(canvas,true);
const scene=new BABYLON.Scene(engine);

scene.clearColor=new BABYLON.Color4(0.01,0.02,0.05,1);


const camera=new BABYLON.ArcRotateCamera(
"cam",
-Math.PI/2,
Math.PI/2.65,
380,
BABYLON.Vector3.Zero(),
scene
);

camera.attachControl(canvas,true);

camera.useNaturalPinchZoom=true;
camera.pinchDeltaPercentage=0.01;
camera.wheelDeltaPercentage=0.01;
camera.panningSensibility=120;


new BABYLON.HemisphericLight(
"hemi",
new BABYLON.Vector3(0,1,0),
scene
);


const nodes={}
const dataMap={}
const lines=[]
let focused=null


function curvedLine(a,b,color){

const mid=BABYLON.Vector3.Lerp(a,b,0.5)

const dir=b.subtract(a)

const n=new BABYLON.Vector3(
-dir.z,0,dir.x
).normalize()

mid.addInPlace(n.scale(5))

const curve=BABYLON.Curve3.CreateQuadraticBezier(
a,mid,b,24
)

const tube=BABYLON.MeshBuilder.CreateTube(
"tube",
{path:curve.getPoints(),radius:0.1},
scene
)

const m=new BABYLON.StandardMaterial("m",scene)
m.emissiveColor=color
m.disableLighting=true

tube.material=m

lines.push(tube)

}
fetch("app-data.json?nocache=" + Date.now(),{
cache:"no-store"
})
.then(r=>{

if(!r.ok){
throw new Error("HTTP "+r.status)
}

return r.json()

})
.then(all=>{

all.forEach(d=>{
dataMap[d.id]=d
})

createNode("PRIM_CHAOS_001",0,0,0)

})
.catch(err=>{

document.getElementById("info").innerHTML=
"JSON ERROR<br>"+err

console.error(err)

})
