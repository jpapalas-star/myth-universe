<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Myth Universe Focus Orbit</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02040a;font-family:Arial,sans-serif}
#renderCanvas{width:100%;height:100%;display:block;touch-action:none}
#panel{
  position:fixed;left:10px;top:10px;z-index:10;color:#fff;
  background:rgba(0,0,0,.38);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:10px 12px;font-size:13px;line-height:1.45;
}
#resetBtn{
  position:fixed;right:10px;top:10px;z-index:20;
  background:rgba(20,20,30,.84);color:#fff;border:1px solid rgba(255,255,255,.18);
  border-radius:12px;padding:10px 14px;font-size:14px;cursor:pointer;display:none;
}
#info{
  position:fixed;right:10px;top:60px;z-index:10;color:#fff;
  width:min(360px,calc(100vw - 20px));max-height:calc(100vh - 70px);
  overflow:auto;background:rgba(0,0,0,.46);border:1px solid rgba(255,255,255,.12);
  border-radius:12px;padding:12px 14px;
}
#info h2{margin:0 0 6px 0;font-size:20px}
#info .sub{opacity:.78;font-size:13px;margin-bottom:10px}
#info .sec{color:#8fd3ff;margin:10px 0 4px 0;font-weight:bold;font-size:13px}
#info .txt{font-size:13px;line-height:1.5;white-space:pre-wrap}
@media (max-width:900px){
  #info{top:auto;left:10px;right:10px;bottom:10px;width:auto;max-height:40vh}
}
</style>
</head>
<body>
<div id="panel">
  <div><b>Myth Universe</b></div>
  <div>Drag = rotate</div>
  <div>Pinch / wheel = zoom</div>
  <div>Tap entity = family focus</div>
</div>
<button id="resetBtn">Μυθολογία</button>
<div id="info">
  <h2>Myth Universe</h2>
  <div class="sub">Chaos center · family focus mode</div>
  <div class="txt">Πάτα σε έναν πλανήτη για πληροφορίες. Πάτα στο κενό για κλείσιμο panel.</div>
</div>
<canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);
const scene = new BABYLON.Scene(engine);
scene.clearColor = new BABYLON.Color4(0.01,0.02,0.05,1);

const camera = new BABYLON.ArcRotateCamera("cam",-Math.PI/2,Math.PI/2.65,400,BABYLON.Vector3.Zero(),scene);
camera.lowerRadiusLimit = 30;
camera.upperRadiusLimit = 5000;
camera.wheelDeltaPercentage = 0.01;
camera.pinchDeltaPercentage = 0.01;
camera.useNaturalPinchZoom = true;
camera.attachControl(canvas, true);
if (camera.inputs && camera.inputs.attached && camera.inputs.attached.pointers) {
  camera.inputs.attached.pointers.multiTouchPanAndZoom = true;
}

const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0,1,0), scene);
hemi.intensity = 0.96;
const glow = new BABYLON.GlowLayer("glow", scene);
glow.intensity = 0.14;

const nodes = {};
const dataMap = {};
const familyColorByKey = new Map();
const placed = new Set();
let allData = [];
let currentLineMeshes = [];
let focusMode = false;
let currentFocusId = null;
let orbiters = [];
let orbitObserver = null;
let backArmed = false;

function c3(hex){ return BABYLON.Color3.FromHexString(hex); }
function hslToHex(h,s,l){s/=100;l/=100;const k=n=>(n+h/30)%12;const a=s*Math.min(l,1-l);const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1)));const toHex=x=>Math.round(255*x).toString(16).padStart(2,'0');return `#${toHex(f(0))}${toHex(f(8))}${toHex(f(4))}`;}
function hashColor(str){let h=0;for(let i=0;i<str.length;i++) h=(h*31+str.charCodeAt(i))>>>0;return BABYLON.Color3.FromHexString(hslToHex(h%360,80,64));}
function idsFromField(s){if(!s||s==='-') return []; return String(s).split(';').map(v=>v.trim()).filter(Boolean).filter(v=>v!=='-');}
function coupleKey(a,b){ return [a,b].sort().join('|'); }

function modelColor(d){
  const id=String(d.id||''),model=String(d.ModelType||''),cat=String(d.Category||'');
  if(id==='PRIM_CHAOS_001') return c3('#ffffff');
  if(model==='group'||d.Shape==='group') return c3('#62a6ff');
  if(model==='energy') return c3('#c084ff');
  if(model==='giant') return c3('#ffbf5e');
  if(model==='spirit') return c3('#ff6b6b');
  if(model==='human') return c3('#d6a86f');
  if(model==='goddess') return c3('#ffd3f0');
  if(model==='god') return c3('#ffe680');
  if(cat.includes('Πρωτογεν')) return c3('#c084ff');
  if(cat.includes('Τιτά')) return c3('#ffbf5e');
  if(cat.includes('Ολύμπ')) return c3('#ffe680');
  if(cat.includes('Ήρω')) return c3('#d6a86f');
  return c3('#b8c5ff');
}
function spriteFile(d){
  const sprite=String(d.sprite||''),model=String(d.ModelType||''),gender=String(d.Gender||'');
  if(sprite==='orb-group') return 'group.png';
  if(sprite==='energy-neutral'||sprite==='energy-female') return 'energy.png';
  if(sprite==='titan-male') return 'titan_male.png';
  if(sprite==='titan-female') return 'titan_female.png';
  if(sprite==='god') return gender==='female'?'god_female.png':'god_male.png';
  if(sprite==='goddess') return 'god_female.png';
  if(sprite==='hero') return 'hero_male.png';
  if(sprite==='heroine') return 'hero_female.png';
  if(sprite==='monster') return gender==='female'?'monster_female.png':'monster_male.png';
  if(sprite==='spirit') return 'spirit.png';
  if(sprite==='cosmic') return 'cosmic.png';
  if(model==='group') return 'group.png';
  if(model==='energy') return 'energy.png';
  if(model==='giant') return gender==='female'?'titan_female.png':'titan_male.png';
  if(model==='spirit') return 'spirit.png';
  if(model==='human') return gender==='female'?'hero_female.png':'hero_male.png';
  if(model==='goddess') return 'god_female.png';
  if(model==='god') return gender==='female'?'god_female.png':'god_male.png';
  return 'default.png';
}
function sizeFor(d){
  const model=String(d.ModelType||''),id=String(d.id||'');
  if(id==='PRIM_CHAOS_001') return 14;
  if(model==='group') return 7.8;
  if(model==='energy') return 8.5;
  if(model==='giant') return 7.8;
  if(model==='god'||model==='goddess') return 6.8;
  if(model==='human') return 6.1;
  if(model==='spirit') return 5.8;
  return 6.3;
}
function addRing(mesh,color,diameter,thickness){
  const ring=BABYLON.MeshBuilder.CreateTorus('ring_'+Math.random(),{diameter,thickness:thickness||0.11,tessellation:70},scene);
  ring.rotation.x=Math.PI/2;
  ring.position=mesh.position.clone();
  const rm=new BABYLON.StandardMaterial('rm_'+Math.random(),scene);
  rm.emissiveColor=color; rm.alpha=0.92; ring.material=rm;
  glow.addIncludedOnlyMesh(ring);
  return ring;
}
function createLabel(text,pos,size){
  const dt=new BABYLON.DynamicTexture('dt_'+Math.random(),{width:512,height:128},scene,true);
  dt.hasAlpha=true;
  dt.drawText(text,null,82,'bold 40px Arial','#ead271','transparent',true);
  const plane=BABYLON.MeshBuilder.CreatePlane('label_'+Math.random(),{width:Math.max(6,size*2.1),height:Math.max(1.6,size*0.58)},scene);
  plane.position=pos.add(new BABYLON.Vector3(0,size*0.92,0));
  plane.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;
  const mat=new BABYLON.StandardMaterial('lmat_'+Math.random(),scene);
  mat.diffuseTexture=dt; mat.opacityTexture=dt; mat.disableLighting=true;
  mat.emissiveColor=BABYLON.Color3.White().scale(0.84); mat.backFaceCulling=false;
  plane.material=mat;
  return plane;
}
function createNode(d,x,y,z,coupleColor){
  const size=sizeFor(d), baseColor=coupleColor||modelColor(d);
  const sphere=BABYLON.MeshBuilder.CreateSphere('sphere_'+d.id,{diameter:size,segments:28},scene);
  sphere.position=new BABYLON.Vector3(x,y,z);
  const sm=new BABYLON.StandardMaterial('sm_'+d.id,scene);
  sm.diffuseColor=baseColor.scale(0.16); sm.emissiveColor=baseColor.scale(0.07); sm.specularColor=BABYLON.Color3.Black(); sm.alpha=0.92;
  sphere.material=sm;

  const disc=BABYLON.MeshBuilder.CreateDisc('disc_'+d.id,{radius:size*0.37,tessellation:48},scene);
  disc.position=sphere.position.clone(); disc.billboardMode=BABYLON.Mesh.BILLBOARDMODE_ALL;
  const pm=new BABYLON.StandardMaterial('pm_'+d.id,scene);
  const tex=new BABYLON.Texture('./'+spriteFile(d),scene,true,false);
  tex.hasAlpha=true;
  pm.diffuseTexture=tex; pm.opacityTexture=tex; pm.useAlphaFromDiffuseTexture=true;
  pm.transparencyMode=BABYLON.Material.MATERIAL_ALPHABLEND; pm.alpha=0.70;
  pm.disableLighting=true; pm.backFaceCulling=false; pm.emissiveColor=BABYLON.Color3.White().scale(0.76);
  disc.material=pm;

  const label=createLabel(d.Name||d.id,sphere.position.clone(),size);
  const rings=[];
  if(String(d.id)==='PRIM_CHAOS_001') rings.push(addRing(sphere,c3('#ffffff'),size*1.36,0.13));
  if(d.ModelType==='energy') rings.push(addRing(sphere,c3('#deb3ff'),size*1.18,0.10));
  if(d.ModelType==='group'||d.Shape==='group'||d.ring===true) rings.push(addRing(sphere,modelColor(d),size*1.24,0.10));
  if(coupleColor) rings.push(addRing(sphere,coupleColor,size*1.12,0.09));

  sphere.metadata=d; disc.metadata=d; label.metadata=d;
  nodes[d.id]={sphere,disc,label,rings,original:new BABYLON.Vector3(x,y,z)};
  placed.add(d.id);
}
function setNodePosition(id, pos){
  const n=nodes[id]; if(!n) return;
  const size=sizeFor(dataMap[id]);
  n.sphere.position=pos.clone();
  n.disc.position=pos.clone();
  n.label.position=pos.add(new BABYLON.Vector3(0,size*0.92,0));
  n.rings.forEach(r=>r.position=pos.clone());
}
function setNodeVisible(id, visible){
  const n=nodes[id]; if(!n) return;
  n.sphere.setEnabled(visible);
  n.disc.setEnabled(visible);
  n.label.setEnabled(visible);
  n.rings.forEach(r=>r.setEnabled(visible));
}
function resetInfo(){
  document.getElementById('info').innerHTML=`<h2>Myth Universe</h2><div class="sub">Chaos center · family focus mode</div><div class="txt">Πάτα σε έναν πλανήτη για πληροφορίες. Πάτα στο κενό για κλείσιμο panel.</div>`;
}
function showInfo(d){
  document.getElementById('info').innerHTML=`<h2>${d.Name||d.id}</h2><div class="sub">${d.Category||''} · ${d.ModelType||''} · Gen ${d.Generation ?? '-'}</div><div class="sec">Summary</div><div class="txt">${d.Summary||'-'}</div><div class="sec">Parents</div><div class="txt">${d.Parents||'-'}</div><div class="sec">Partners</div><div class="txt">${d.Partners||'-'}</div><div class="sec">Children</div><div class="txt">${d.Children||'-'}</div><div class="sec">FullText</div><div class="txt">${d.FullText||'-'}</div>`;
}
function buildFamilies(all){
  const families=[]; const inFamilyChild=new Set();
  all.forEach(d=>{
    const partners=idsFromField(d.Partners), kidsA=new Set(idsFromField(d.Children));
    partners.forEach(pid=>{
      const p=dataMap[pid]; if(!p) return;
      const kidsB=new Set(idsFromField(p.Children));
      const shared=[...kidsA].filter(k=>kidsB.has(k));
      if(shared.length){
        const key=coupleKey(d.id,pid);
        if(!families.find(f=>f.key===key)){
          families.push({key,parents:[d.id,pid],children:shared});
          shared.forEach(c=>inFamilyChild.add(c));
        }
      }
    });
  });
  all.forEach(d=>{
    const kids=idsFromField(d.Children).filter(k=>!inFamilyChild.has(k));
    if(kids.length){
      families.push({key:'single|'+d.id,parents:[d.id],children:kids});
      kids.forEach(k=>inFamilyChild.add(k));
    }
  });
  return families;
}
function polarPositions(count,radius,yBase,jitter){
  const out=[], n=count||1;
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2*i/n)-Math.PI/2;
    out.push({x:Math.cos(angle)*radius,y:yBase+Math.sin(angle*2)*(jitter||0),z:Math.sin(angle)*radius});
  }
  return out;
}
function placeFamily(center,family,coupleColor){
  const parents=family.parents.map(id=>dataMap[id]).filter(Boolean);
  const children=family.children.map(id=>dataMap[id]).filter(Boolean);
  if(parents.length===1){
    createNode(parents[0],center.x,center.y,center.z,coupleColor);
  } else if(parents.length>=2){
    const gap=7.5;
    createNode(parents[0],center.x-gap/2,center.y,center.z,coupleColor);
    createNode(parents[1],center.x+gap/2,center.y,center.z,coupleColor);
  }
  const n=children.length||1, childRadius=Math.max(13,9+n*1.2);
  for(let i=0;i<n;i++){
    const angle=(Math.PI*2*i/n)-Math.PI/2;
    createNode(children[i],center.x+Math.cos(angle)*childRadius,center.y+Math.sin(angle*2)*1.4,center.z+Math.sin(angle)*childRadius,null);
  }
}
function placeRing(items,radius,yBase,jitter){
  const pos=polarPositions(items.length,radius,yBase,jitter);
  items.forEach((d,i)=>createNode(d,pos[i].x,pos[i].y,pos[i].z,null));
}
function curvedPath(aPos,bPos,mode){
  const dir=bPos.subtract(aPos), len=dir.length();
  let perp=new BABYLON.Vector3(-dir.z,0,dir.x);
  if(perp.length()<0.001) perp=new BABYLON.Vector3(1,0,0);
  perp=perp.normalize();
  const upAmount=Math.min(18,Math.max(6,len*0.16));
  const sideAmount=Math.min(22,Math.max(5,len*0.12));
  let control=BABYLON.Vector3.Lerp(aPos,bPos,0.5);
  if(mode==='partner') control=control.add(perp.scale(sideAmount));
  else control=control.add(new BABYLON.Vector3(0,upAmount,0)).add(perp.scale(sideAmount*0.35));
  const points=[], steps=24;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    const p1=BABYLON.Vector3.Lerp(aPos,control,t);
    const p2=BABYLON.Vector3.Lerp(control,bPos,t);
    points.push(BABYLON.Vector3.Lerp(p1,p2,t));
  }
  return points;
}
function clearLines(){
  currentLineMeshes.forEach(m=>m.dispose());
  currentLineMeshes=[];
}
function addArrowMarkersAlong(path, holder){
  if(path.length<3) return;
  const count=Math.max(1,Math.floor(path.length/6));
  for(let i=1;i<=count;i++){
    const idx=Math.min(path.length-2,Math.max(1,Math.floor(i*(path.length-1)/(count+1))));
    const p=path[idx], next=path[idx+1], dir=next.subtract(p).normalize();
    const cone=BABYLON.MeshBuilder.CreateCylinder('arrow_'+Math.random(),{height:2.1,diameterTop:0,diameterBottom:0.95,tessellation:8},scene);
    cone.position=p.clone();
    cone.rotationQuaternion=BABYLON.Quaternion.FromLookDirectionLH(dir,BABYLON.Vector3.Up());
    cone.rotate(BABYLON.Axis.X,Math.PI/2,BABYLON.Space.LOCAL);
    const m=new BABYLON.StandardMaterial('arrm_'+Math.random(),scene);m.emissiveColor=c3('#56a6ff');cone.material=m;
    cone.parent=holder;
  }
}
function buildLines(filterSet=null){
  clearLines();
  const done=new Set();
  allData.forEach(d=>{
    idsFromField(d.Partners).forEach(pid=>{
      const key='m_'+[d.id,pid].sort().join('_');
      if(done.has(key)) return;
      if(filterSet && (!filterSet.has(d.id) || !filterSet.has(pid))) return;
      const a=nodes[d.id]?.sphere, b=nodes[pid]?.sphere;
      if(!a||!b) return;
      const path=curvedPath(a.position.clone(),b.position.clone(),'partner');
      const tube=BABYLON.MeshBuilder.CreateTube('tube_'+key,{path,radius:0.10,tessellation:12},scene);
      const m=new BABYLON.StandardMaterial('tm_'+key,scene);m.emissiveColor=familyColorByKey.get(coupleKey(d.id,pid))||c3('#ff4b4b');tube.material=m;
      currentLineMeshes.push(tube); done.add(key);
    });
    idsFromField(d.Parents).forEach(pid=>{
      const key='p_'+pid+'_'+d.id;
      if(done.has(key)) return;
      if(filterSet && (!filterSet.has(d.id) || !filterSet.has(pid))) return;
      const a=nodes[pid]?.sphere, b=nodes[d.id]?.sphere;
      if(!a||!b) return;
      const path=curvedPath(a.position.clone(),b.position.clone(),'parent');
      const holder=new BABYLON.TransformNode('holder_'+key,scene);
      const tube=BABYLON.MeshBuilder.CreateTube('tube_'+key,{path,radius:0.09,tessellation:12},scene);
      const m=new BABYLON.StandardMaterial('tm_'+key,scene);m.emissiveColor=c3('#56a6ff');tube.material=m;tube.parent=holder;
      addArrowMarkersAlong(path, holder);
      currentLineMeshes.push(holder); done.add(key);
    });
  });
}
function stopOrbit(){
  orbiters=[];
  if(orbitObserver){
    scene.onBeforeRenderObservable.remove(orbitObserver);
    orbitObserver=null;
  }
}
function startOrbit(childrenIds){
  stopOrbit();
  orbiters = childrenIds.map((cid, i)=>({
    id: cid,
    radius: 14 + i*2.4,
    speed: 0.28 + i*0.03,
    offset: i*0.9
  }));
  orbitObserver = scene.onBeforeRenderObservable.add(()=>{
    const tBase = performance.now()*0.001;
    orbiters.forEach((o, i)=>{
      const n = nodes[o.id];
      if(!n) return;
      const t = tBase*o.speed + o.offset;
      const pos = new BABYLON.Vector3(
        Math.cos(t)*o.radius,
        -1 + Math.sin(t*1.4)*1.2,
        10 + Math.sin(t)*o.radius*0.55
      );
      setNodePosition(o.id, pos);
    });
    const keep=new Set([currentFocusId, ...idsFromField(dataMap[currentFocusId]?.Parents), ...idsFromField(dataMap[currentFocusId]?.Partners), ...idsFromField(dataMap[currentFocusId]?.Children)]);
    buildLines(keep);
  });
}
function resetUniverse(){
  focusMode=false; currentFocusId=null;
  stopOrbit();
  Object.keys(nodes).forEach(id=>{
    setNodeVisible(id,true);
    setNodePosition(id,nodes[id].original.clone());
  });
  buildLines(null);
  document.getElementById('resetBtn').style.display='none';
  resetInfo();
  camera.setTarget(BABYLON.Vector3.Zero());
  BABYLON.Animation.CreateAndStartAnimation('camReset', camera, 'radius', 60, 24, camera.radius, 400, 0);
  if(backArmed){
    history.back();
    backArmed=false;
  }
}
function familyFocus(id){
  const d=dataMap[id]; if(!d) return;
  focusMode=true; currentFocusId=id;
  const parents=idsFromField(d.Parents);
  const partners=idsFromField(d.Partners);
  const children=idsFromField(d.Children);
  const keep=new Set([id,...parents,...partners,...children]);

  Object.keys(nodes).forEach(k=>setNodeVisible(k, keep.has(k)));

  setNodePosition(id, new BABYLON.Vector3(0,0,0));

  if(partners.length && nodes[partners[0]]) setNodePosition(partners[0], new BABYLON.Vector3(10,0,0));

  if(parents.length===1 && nodes[parents[0]]) setNodePosition(parents[0], new BABYLON.Vector3(0,6,-14));
  if(parents.length>=2){
    if(nodes[parents[0]]) setNodePosition(parents[0], new BABYLON.Vector3(-6,6,-14));
    if(nodes[parents[1]]) setNodePosition(parents[1], new BABYLON.Vector3(6,6,-14));
  }

  children.forEach((cid,i)=>{
    if(nodes[cid]) setNodePosition(cid, new BABYLON.Vector3(12 + i*2, 0, 10));
  });

  buildLines(keep);
  startOrbit(children);
  showInfo(d);
  document.getElementById('resetBtn').style.display='block';
  camera.setTarget(BABYLON.Vector3.Zero());
  BABYLON.Animation.CreateAndStartAnimation('camFocus', camera, 'radius', 60, 24, camera.radius, 85, 0);

  if(!backArmed){
    history.pushState({focus:true,id}, '');
    backArmed=true;
  }
}
document.getElementById('resetBtn').addEventListener('click', resetUniverse);
window.addEventListener('popstate', ()=>{
  if(focusMode){
    resetUniverse();
  }
});
scene.onPointerObservable.add((pi)=>{
  if(pi.type!==BABYLON.PointerEventTypes.POINTERDOWN) return;
  const pick=scene.pick(scene.pointerX, scene.pointerY);
  if(pick && pick.hit && pick.pickedMesh && pick.pickedMesh.metadata){
    familyFocus(pick.pickedMesh.metadata.id);
  } else if(!focusMode){
    resetInfo();
  }
}, BABYLON.PointerEventTypes.POINTERDOWN);

fetch('./app-data.json?v=focus-orbit-v4').then(r=>r.json()).then(all=>{
  allData=all;
  all.forEach(d=>dataMap[d.id]=d);

  const chaos=all.find(d=>d.id==='PRIM_CHAOS_001');
  if(chaos) createNode(chaos,0,0,0,null);

  const families=buildFamilies(all);
  const famPos=polarPositions(families.length,82,0,8);
  families.forEach((f,i)=>{
    const color=hashColor(f.key);
    familyColorByKey.set(f.key,color);
    placeFamily(famPos[i],f,color);
  });

  const leftovers=all.filter(d=>d.id!=='PRIM_CHAOS_001'&&!placed.has(d.id));
  const ring1=leftovers.filter(d=>Number(d.Generation||9)===1||d.ModelType==='energy');
  const used1=new Set(ring1.map(d=>d.id));
  const ring2=leftovers.filter(d=>!used1.has(d.id)&&(d.ModelType==='group'||d.Shape==='group'));
  const used2=new Set([...used1,...ring2.map(d=>d.id)]);
  const ring3=leftovers.filter(d=>!used2.has(d.id)&&d.ModelType==='giant');
  const used3=new Set([...used2,...ring3.map(d=>d.id)]);
  const ring4=leftovers.filter(d=>!used3.has(d.id)&&Number(d.Generation||9)===3);
  const used4=new Set([...used3,...ring4.map(d=>d.id)]);
  const ring5=leftovers.filter(d=>!used4.has(d.id));

  placeRing(ring1,138,6,4);
  placeRing(ring2,182,
