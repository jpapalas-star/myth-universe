<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Myth Universe FIX</title>
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<style>
html,body{margin:0;overflow:hidden;background:black}
canvas{width:100%;height:100%;display:block}
</style>
</head>
<body>
<canvas id="renderCanvas"></canvas>
<script>

const canvas=document.getElementById("renderCanvas")
const engine=new BABYLON.Engine(canvas,true)
const scene=new BABYLON.Scene(engine)

scene.clearColor=new BABYLON.Color3(0,0,0)

const camera=new BABYLON.ArcRotateCamera(
"cam",
Math.PI/2,
Math.PI/3,
200,
new BABYLON.Vector3(0,0,0),
scene
)

camera.attachControl(canvas,true)

new BABYLON.HemisphericLight(
"light",
new BABYLON.Vector3(1,1,0),
scene
)

const sprites={
god:"god_male.png",
goddess:"god_female.png",
hero:"hero_male.png",
heroine:"hero_female.png",
monster:"monster_male.png",
spirit:"spirit.png",
energy:"energy.png",
group:"group.png",
titan:"titan_male.png"
}

function createNode(d,x,z){

let mesh

if(d.Shape==="group"){

mesh=BABYLON.MeshBuilder.CreateSphere(
d.id,
{diameter:10},
scene
)

const m=new BABYLON.StandardMaterial("m",scene)
m.emissiveColor=new BABYLON.Color3(0.7,0.2,1)
mesh.material=m

}else{

mesh=BABYLON.MeshBuilder.CreatePlane(
d.id,
{size:10},
scene
)

const tex=new BABYLON.Texture(
sprites[d.ModelType]||"group.png",
scene
)

const m=new BABYLON.StandardMaterial("m",scene)
m.diffuseTexture=tex
m.emissiveColor=new BABYLON.Color3(1,1,1)

mesh.material=m

}

mesh.position.x=x
mesh.position.z=z

}
console.log("LOADING JSON 999")
fetch("/myth-universe/app-data.json?v=999")
.then(r=>r.json())
.then(data => {

console.log("COUNT", data.length)

let i=0

data.forEach(d=>{

createNode(
d,
(i%12)*12,
Math.floor(i/12)*12
)

i++

})

})

engine.runRenderLoop(()=>{
scene.render()
})

</script>
</body>
</html>
