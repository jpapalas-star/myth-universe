<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Myth Universe</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>

html,body{
margin:0;
overflow:hidden;
background:black;
}

canvas{
width:100%;
height:100%;
display:block;
}

</style>

</head>
<body>

<canvas id="renderCanvas"></canvas>

<script>


const canvas =
document.getElementById("renderCanvas")

const engine =
new BABYLON.Engine(canvas,true)

const scene =
new BABYLON.Scene(engine)

scene.clearColor =
new BABYLON.Color3(0,0,0)



const camera =
new BABYLON.ArcRotateCamera(
"cam",
Math.PI/2,
Math.PI/3,
180,
BABYLON.Vector3.Zero(),
scene
)

camera.attachControl(canvas,true)

camera.panningSensibility = 60



const light =
new BABYLON.HemisphericLight(
"l",
new BABYLON.Vector3(1,1,0),
scene
)



// ---------- LOAD DATA ----------


let DATA = []


fetch("./app-data.json")
.then(r=>r.json())
.then(d=>{

DATA = d

build()

})



// ---------- CHAOS ----------


function createChaos(){

const s =
BABYLON.MeshBuilder.CreateSphere(
"chaos",
{diameter:8},
scene
)

const m =
new BABYLON.StandardMaterial("m",scene)

m.emissiveColor =
new BABYLON.Color3(1,0.5,1)

s.material = m

return s

}



// ---------- GET IMAGE ----------


function getImage(type){

if(!type) return "default.png"

type = type.toLowerCase()

if(type.includes("god")) return "god_male.png"
if(type.includes("titan")) return "titan_male.png"
if(type.includes("hero")) return "hero_male.png"
if(type.includes("monster")) return "monster_male.png"
if(type.includes("spirit")) return "spirit.png"
if(type.includes("energy")) return "energy.png"
if(type.includes("group")) return "group.png"
if(type.includes("cosmic")) return "cosmic.png"

return "default.png"

}



// ---------- PLANET ----------


function createPlanet(name,type,pos){

let file =
getImage(type)


const plane =
BABYLON.MeshBuilder.CreatePlane(
name,
{size:6},
scene
)

plane.position = pos


const mat =
new BABYLON.StandardMaterial(
"m"+name,
scene
)


const tex =
new BABYLON.Texture(
"./"+file,
scene,
true,
false
)


tex.hasAlpha = true

mat.diffuseTexture = tex
mat.opacityTexture = tex
mat.useAlphaFromDiffuseTexture = true

mat.emissiveColor =
new BABYLON.Color3(1,1,1)

mat.alpha = 0.9

plane.material = mat


createText(name,pos)


return plane

}



// ---------- TEXT ----------


function createText(name,pos){

const plane =
BABYLON.MeshBuilder.CreatePlane(
"t"+name,
{size:8},
scene
)

plane.position =
pos.add(
new BABYLON.Vector3(0,4,0)
)


const dt =
new BABYLON.DynamicTexture(
"dt"+name,
{width:256,height:64},
scene
)


dt.drawText(
name,
10,
40,
"20px Arial",
"yellow",
"transparent",
true
)


const mat =
new BABYLON.StandardMaterial(
"tm"+name,
scene
)

mat.diffuseTexture = dt
mat.emissiveColor =
BABYLON.Color3.White()

plane.material = mat

}



// ---------- BUILD ----------


function build(){


createChaos()


let radius = 40
let angle = 0


DATA.forEach(d=>{


angle += Math.PI*2 / DATA.length


let x =
Math.cos(angle) * radius

let z =
Math.sin(angle) * radius


createPlanet(
d.Name,
d.Type,
new BABYLON.Vector3(x,0,z)
)


})


}



// ---------- LOOP ----------


engine.runRenderLoop(function(){

scene.render()

})


window.addEventListener(
"resize",
function(){

engine.resize()

})



</script>

</body>
</html>
