<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<script src="https://cdn.babylonjs.com/babylon.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

</style>

</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c")

const engine = new BABYLON.Engine(canvas,true)

const scene = new BABYLON.Scene(engine)

scene.clearColor = new BABYLON.Color3(0,0,0)

const camera =
new BABYLON.ArcRotateCamera(
"cam",
Math.PI/2,
Math.PI/3,
200,
new BABYLON.Vector3(0,0,0),
scene
)

camera.attachControl(canvas,true)

new BABYLON.HemisphericLight(
"l",
new BABYLON.Vector3(1,1,0),
scene
)

const nodes = {}

fetch("app-data.json")
.then(r=>r.json())
.then(data=>{

const byGen = {}

data.forEach(r=>{

if(!byGen[r.Generation])
byGen[r.Generation]=[]

byGen[r.Generation].push(r)

})

Object.keys(byGen).forEach(g=>{

let arr = byGen[g]

arr.forEach((r,i)=>{

let x = i*15 - arr.length*7

let y = -g*25

let s =
BABYLON.MeshBuilder.CreateSphere(
"s",
{diameter:6},
scene
)

s.position =
new BABYLON.Vector3(x,y,0)

let mat =
new BABYLON.StandardMaterial(
"m",
scene
)

let img =
(r.sprite || "default") + ".png"

mat.diffuseTexture =
new BABYLON.Texture(
img,
scene
)

s.material = mat

nodes[r.id] = s

})

})

data.forEach(r=>{

if(r.Parents && r.Parents!="-"){

r.Parents.split(";").forEach(p=>{

if(nodes[p] && nodes[r.id]){

let l =
BABYLON.MeshBuilder.CreateLines(
"l",
{
points:[
nodes[p].position,
nodes[r.id].position
]
},
scene
)

l.color =
new BABYLON.Color3(0,0,1)

}

})

}

if(r.Partners && r.Partners!="-"){

r.Partners.split(";").forEach(p=>{

if(nodes[p] && nodes[r.id]){

let l =
BABYLON.MeshBuilder.CreateLines(
"lp",
{
points:[
nodes[p].position,
nodes[r.id].position
]
},
scene
)

l.color =
new BABYLON.Color3(1,0,0)

}

})

}

})

})

engine.runRenderLoop(
()=>scene.render()
)

</script>

</body>
</html>
